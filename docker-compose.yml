version: '3.9'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: dsx-workflow-api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      RESEND_API_KEY: ${RESEND_API_KEY}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-azure}
      AZURE_STORAGE_ACCOUNT: ${AZURE_STORAGE_ACCOUNT}
      AZURE_STORAGE_KEY: ${AZURE_STORAGE_KEY}
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-dsx-workflow-files}
      WHATSAPP_PROVIDER_URL: ${WHATSAPP_PROVIDER_URL}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES:-10}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174}
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dsx-workflow-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dsx-workflow-nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    profiles:
      - production
    restart: unless-stopped

volumes:
  redis_data:
