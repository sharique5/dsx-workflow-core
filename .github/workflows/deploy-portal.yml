name: Deploy Portal

on:
  push:
    branches: [main]
    paths:
      - 'apps/portal/**'
      - 'packages/shared/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Client Portal
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Delete lock file so npm resolves rolldown's linux native binding fresh.
        # The lock was generated on Windows and omits @rolldown/binding-linux-x64-gnu.
        run: rm -f package-lock.json && npm install --no-audit

      - name: Build portal app
        run: npx turbo run build --filter=@dsx/portal...

      - name: Copy SWA config to dist
        run: cp apps/portal/staticwebapp.config.json apps/portal/dist/staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PORTAL }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/portal/dist
          output_location: ''
          skip_app_build: true
