name: Deploy Portal

on:
  push:
    branches: [main]
    paths:
      - 'apps/portal/**'
      - 'packages/shared/**'

jobs:
  build-and-deploy:
    name: Build & Deploy Client Portal
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build portal app
        run: npx turbo run build --filter=@dsx/portal...
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Deploy to Azure Static Web Apps
        # Required:
        #   Secret: AZURE_STATIC_WEB_APPS_API_TOKEN_PORTAL
        #     → Azure portal → Static Web App (portal) → Manage deployment token
        #   Variable: VITE_API_URL
        #     → GitHub repo → Settings → Variables → e.g. https://api.dsx-workflow.com
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PORTAL }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/portal
          output_location: dist
          skip_app_build: true  # already built above by turbo
