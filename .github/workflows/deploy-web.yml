name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'

jobs:
  build-and-deploy:
    name: Build & Deploy Web App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Delete lock file so npm resolves rolldown's linux native binding fresh.
        # The lock was generated on Windows and omits @rolldown/binding-linux-x64-gnu.
        run: rm -f package-lock.json && npm install --no-audit

      - name: Build web app
        run: npx turbo run build --filter=@dsx/web...
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Deploy to Azure Static Web Apps
        # Required:
        #   Secret: AZURE_STATIC_WEB_APPS_API_TOKEN_WEB
        #     → Azure portal → Static Web App → Manage deployment token
        #   Variable: VITE_API_URL
        #     → GitHub repo → Settings → Variables → e.g. https://api.dsx-workflow.com
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WEB }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web
          output_location: dist
          skip_app_build: true  # already built above by turbo
