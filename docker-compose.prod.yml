# Production compose — uses pre-built image from GHCR, no local Redis (uses Upstash).
# On the server: docker compose -f docker-compose.prod.yml up -d

version: '3.9'

services:
  api:
    # Image pushed by GitHub Actions deploy-api workflow
    # Replace GITHUB_ORG with your GitHub username/org
    image: ghcr.io/sharique5/dsx-workflow-api:latest
    container_name: dsx-workflow-api
    ports:
      - '3000:3000'
    env_file: .env          # .env lives on the server, never in git
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dsx-workflow-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
